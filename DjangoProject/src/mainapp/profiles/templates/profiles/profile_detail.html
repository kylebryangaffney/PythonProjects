{% extends "base.html" %}
{% block title %}Royal Hotels{% endblock %}
{% block header %}Profile Details:{% endblock %}
{% block content %}

<div class="admin_panel">
    <form method="POST" id="thisForm" action="{% url 'profiles:profile_details' form.instance.pk %}">
        <table>
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_table }}
        </table>
        <div class="frmBtn_container">
            <input type="submit">
            <div class="frmBtn_container">
                <button class="btn"><a href="{% url 'profiles:profile_delete' form.instance.pk %}">Delete</a></button>
                <button class="btn"><a href="{% url 'home' %}">Cancel</a></button>
            </div>
        </div>
    </form>
</div>

{% endblock %}
