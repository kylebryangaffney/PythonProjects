{% extends "base.html" %}
{% block title %}Royal Hotels{% endblock %}
{% block header %}Create A New Profile:{% endblock %}
{% block content %}


    <div class="admin_panel">
        <form method="POST" action="{% url 'profiles:profile_create' %}">
            <div class="frmObject_container">
                <!-- Cross Site Request Forgery (csrf_token) protection -->
                {% csrf_token %}
                {{ form.non_field_errors }}
                {{ form.as_p }}
            </div>
            <div class="frmBtn_container">
                <input type="submit" class="btn" value="Create New Profile" name="Save_Item">
                <a href="{% url 'profiles:profile_list' %}"><button type="button" class="btn" value="Cancel">Cancel</button></a>
            </div>
        </form>
    </div>



{% endblock %}
